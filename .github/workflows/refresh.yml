name: Refresh SLABCAST

on:
  schedule:
    # GitHub's free scheduler is best-effort and lags at on-the-hour peak times,
    # so we run a few off-peak early-AM slots for redundancy. Times are UTC.
    - cron: "17 8 * * *"    # ~1:17 AM Pacific
    - cron: "17 11 * * *"   # ~4:17 AM Pacific
    - cron: "17 13 * * *"   # ~6:17 AM Pacific
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install optional deps
        run: pip install requests
      - name: Generate dashboard
        run: python3 surf_refresh.py
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
