name: Refresh SLABCAST

on:
  schedule:
    # GitHub's free scheduler frequently drops runs, so we fire several spread,
    # off-peak attempts across the early morning. Even if most are skipped,
    # one should land before dawn. Times are UTC (Pacific is UTC-7 in summer).
    - cron: "23 8 * * *"    # ~1:23 AM Pacific
    - cron: "37 10 * * *"   # ~3:37 AM Pacific
    - cron: "23 12 * * *"   # ~5:23 AM Pacific
    - cron: "37 14 * * *"   # ~7:37 AM Pacific
    - cron: "23 16 * * *"   # ~9:23 AM Pacific
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install optional deps
        run: pip install requests
      - name: Generate dashboard
        run: python3 surf_refresh.py
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
